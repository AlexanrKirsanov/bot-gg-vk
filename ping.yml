name: Keep Replit Awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Каждые 5 минут
  workflow_dispatch:       # Возможность запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Replit
        run: |
          curl -X GET "https://твой-проект.твой-ник.repl.co/ping"
          echo "Pinged at $(date)"
