name: Keep Replit Awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Каждые 5 минут
  workflow_dispatch:       # Возможность запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Replit
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://vk-bot-runner--kaaqwerty.repl.co/ping"
          echo "Pinged at $(date)"
